<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KV Anotações — Gerador Automático</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root { --kv-accent: #00ACCD; }
  body { font-family: 'Hind', sans-serif; background: #1e1e1e; color: #e0e0e0; }
  .kv-accent { color: var(--kv-accent); }
  .kv-bg-accent { background-color: var(--kv-accent); }
  input[type="checkbox"] { accent-color: var(--kv-accent); }
  .log-box { font-family: monospace; font-size: 11px; white-space: pre-wrap; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }
</style>
</head>
<body class="p-4">

  <!-- ===================== CABEÇALHO ===================== -->
  <div class="mb-4">
    <h1 class="text-lg font-bold kv-accent">Gerador de Anotações</h1>
    <p class="text-xs text-gray-400">Selecione geometrias no mapa e aplique popups HTML e/ou labels de texto.</p>
  </div>

  <!-- ===================== STATUS DA SELEÇÃO ===================== -->
  <div id="selStatus" class="mb-4 rounded-lg border border-gray-700 bg-[#262626] p-3 text-sm">
    <span class="text-gray-400">Nenhuma geometria selecionada.</span>
  </div>

  <!-- ===================== PROPRIEDADES ===================== -->
  <div class="mb-4 rounded-lg border border-gray-700 bg-[#262626] p-3">
    <h2 class="mb-2 text-sm font-semibold text-gray-200">Propriedades a exibir</h2>
    <div id="propList" class="grid grid-cols-2 gap-2 text-sm">
      <!-- checkboxes gerados via JS -->
    </div>
  </div>

  <!-- ===================== LAYER DE DESTINO ===================== -->
  <div class="mb-4 rounded-lg border border-gray-700 bg-[#262626] p-3">
    <div class="mb-2 flex items-center justify-between">
      <h2 class="text-sm font-semibold text-gray-200">Layer de destino</h2>
      <button id="btnRefreshLayers" class="text-xs text-gray-500 hover:text-gray-300" title="Recarregar lista de layers">↻ recarregar</button>
    </div>
    <select id="layerSelect"
      class="w-full rounded border border-gray-600 bg-[#1e1e1e] px-2 py-1.5 text-sm text-gray-200 focus:border-[#00ACCD] focus:outline-none">
      <option value="default">default</option>
    </select>
  </div>

  <!-- ===================== TIPO DE SAÍDA ===================== -->
  <div class="mb-4 rounded-lg border border-gray-700 bg-[#262626] p-3">
    <h2 class="mb-2 text-sm font-semibold text-gray-200">Tipo de saída</h2>
    <label class="mb-1 flex items-center gap-2 text-sm">
      <input type="checkbox" id="outPopup" checked />
      <span>Gerar HTML Popup</span>
    </label>
    <label class="flex items-center gap-2 text-sm">
      <input type="checkbox" id="outLabel" />
      <span>Gerar Label (geometria de texto)</span>
    </label>
  </div>

  <!-- ===================== AÇÕES ===================== -->
  <div class="mb-4 flex gap-2">
    <button id="btnApply"
      class="kv-bg-accent flex-1 rounded-lg px-4 py-2 text-sm font-semibold text-black transition hover:opacity-80">
      Aplicar Anotações
    </button>
    <button id="btnUpdate"
      class="rounded-lg border border-[#00ACCD] px-4 py-2 text-sm font-semibold text-[#00ACCD] transition hover:bg-[#00ACCD] hover:text-black"
      title="Relê as features de origem e atualiza os valores dos labels, sem mover os pontos">
      Atualizar Pontos
    </button>
  </div>
  <div class="mb-4 flex gap-2">
    <button id="btnClear"
      class="rounded-lg border border-gray-600 px-4 py-2 text-sm text-gray-300 transition hover:bg-gray-700"
      title="Remove labels criados por este app e fecha o popup">
      Limpar
    </button>
    <button id="btnInspect"
      class="rounded-lg border border-gray-600 px-4 py-2 text-sm text-gray-300 transition hover:bg-gray-700"
      title="Despeja o JSON raw das properties da seleção no log — use para descobrir as chaves nativas de label">
      Inspecionar
    </button>
  </div>

  <!-- ===================== LOG ===================== -->
  <div class="rounded-lg border border-gray-700 bg-[#181818] p-2">
    <div class="mb-1 flex items-center justify-between">
      <span class="text-xs font-semibold text-gray-400">Log</span>
      <button id="btnClearLog" class="text-xs text-gray-500 hover:text-gray-300">limpar</button>
    </div>
    <div id="log" class="log-box max-h-40 overflow-y-auto text-gray-400"></div>
  </div>

  <p class="mt-3 text-center text-[10px] text-gray-600">KV Arquitetos · Anotações v8</p>

<script type="module">
import { rpc, giraffeState } from 'https://esm.sh/@gi-nx/iframe-sdk';

/* =========================================================
   CONSTANTES
   ========================================================= */
const SP_TAG = 'kv_annot';            // tag para deleção idempotente (padrão Sun Path)
const DEFAULT_PROPS = [
  { key: 'levels',       label: 'Levels (pavimentos)',    pt: 'Pavimentos' },
  { key: 'usage',        label: 'Usage (uso)',            pt: 'Uso' },
  { key: 'area',         label: 'Area (m²)',              pt: 'Área' },
  { key: 'height',       label: 'Height (m)',             pt: 'Altura' },
  { key: 'name',         label: 'Name (nome)',            pt: 'Nome' },
  { key: 'floorToFloor', label: 'Floor to Floor',         pt: 'Piso a Piso' },
];
const PROP_PT = Object.fromEntries(DEFAULT_PROPS.map((p) => [p.key, p.pt]));

const $ = (id) => document.getElementById(id);
const logBox = $('log');

function log(msg, isErr = false) {
  const line = document.createElement('div');
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  if (isErr) line.classList.add('text-red-400');
  logBox.appendChild(line);
  logBox.scrollTop = logBox.scrollHeight;
}
$('btnClearLog').onclick = () => (logBox.innerHTML = '');

/* =========================================================
   UI — checkboxes de propriedades
   ========================================================= */
const propListEl = $('propList');
DEFAULT_PROPS.forEach((p, i) => {
  const label = document.createElement('label');
  label.className = 'flex items-center gap-2';
  label.innerHTML = `<input type="checkbox" data-prop="${p.key}" ${i < 3 ? 'checked' : ''}/> <span>${p.label}</span>`;
  propListEl.appendChild(label);
});

function getSelectedPropKeys() {
  return [...propListEl.querySelectorAll('input:checked')].map((el) => el.dataset.prop);
}

/* =========================================================
   LAYERS DO PROJETO — popula o dropdown de destino
   ========================================================= */
function extractLayerEntries(raw) {
  let items = [];
  if (Array.isArray(raw)) items = raw;
  else if (raw && typeof raw === 'object') items = Object.values(raw);
  return items
    .filter((l) => l && (l.id || l.name || typeof l === 'string'))
    .map((l) => {
      if (typeof l === 'string') return { id: l, name: l };
      return { id: l.id || l.name, name: l.name || l.id };
    });
}

function populateLayerSelect() {
  const sel = $('layerSelect');
  const current = sel.value;
  const found = new Map();

  // Fonte 1 (confiável): layerIds em uso nos rawSections do projeto
  try {
    getRawSectionFeatures().forEach((f) => {
      const lid = f?.properties?.layerId;
      if (lid && !found.has(lid)) found.set(lid, { id: lid, name: lid });
    });
  } catch (e) { /* ignorar */ }

  // Fonte 2: chaves candidatas do giraffeState — variam entre versões do SDK
  ['projectLayers', 'layers', 'drawingLayers', 'lensableLayers'].forEach((key) => {
    try {
      const entries = extractLayerEntries(giraffeState.get(key));
      entries.forEach((e) => { if (!found.has(e.id)) found.set(e.id, e); });
    } catch (e) { /* chave inexistente — ignorar */ }
  });

  sel.innerHTML = '<option value="default">default</option>';
  [...found.values()]
    .filter((e) => e.id !== 'default')
    .sort((a, b) => String(a.name).localeCompare(String(b.name)))
    .forEach((e) => {
      const opt = document.createElement('option');
      opt.value = e.id;
      opt.textContent = e.name;
      sel.appendChild(opt);
    });

  // Restaura seleção anterior se ainda existir
  if ([...sel.options].some((o) => o.value === current)) sel.value = current;
  log(`Dropdown de layers: ${found.size} layer(s) do projeto + default.`);
}

$('btnRefreshLayers').onclick = populateLayerSelect;

/* =========================================================
   HELPERS DE GEOMETRIA
   ========================================================= */

// Achata coordenadas de qualquer geometria em uma lista de [lng, lat]
function flattenCoords(geom, out = []) {
  if (!geom) return out;
  if (geom.type === 'GeometryCollection') {
    (geom.geometries || []).forEach((g) => flattenCoords(g, out));
    return out;
  }
  const walk = (c) => {
    if (typeof c[0] === 'number') out.push(c);
    else c.forEach(walk);
  };
  if (geom.coordinates) walk(geom.coordinates);
  return out;
}

// Centroide simples: média das coordenadas
function centroid(feature) {
  const pts = flattenCoords(feature.geometry);
  if (!pts.length) return null;
  let sx = 0, sy = 0;
  pts.forEach(([x, y]) => { sx += x; sy += y; });
  return [sx / pts.length, sy / pts.length];
}

// Extrai valor de propriedade (raw ou dentro de properties)
function getProp(feature, key) {
  const p = feature.properties || {};
  let v = p[key];
  if (v === undefined && feature[key] !== undefined) v = feature[key];
  if (v === undefined || v === null || v === '') return null;
  if (typeof v === 'number') return Math.round(v * 100) / 100;
  return v;
}

/* =========================================================
   LEITURA DA SELEÇÃO
   ========================================================= */
async function readSelection() {
  try {
    const result = await rpc.invoke('getSelectedFeatures', []);
    // Normalização defensiva: pode vir array, FeatureCollection ou objeto
    let feats = [];
    if (Array.isArray(result)) feats = result;
    else if (result?.features) feats = result.features;
    else if (result && typeof result === 'object') feats = Object.values(result);
    return feats.filter((f) => f && f.geometry);
  } catch (e) {
    log('Erro em getSelectedFeatures: ' + e.message, true);
    return [];
  }
}

function updateSelStatus(feats) {
  const el = $('selStatus');
  if (!feats.length) {
    el.innerHTML = '<span class="text-gray-400">Nenhuma geometria selecionada.</span>';
    return;
  }
  const types = {};
  feats.forEach((f) => { const t = f.geometry?.type || '?'; types[t] = (types[t] || 0) + 1; });
  const summary = Object.entries(types).map(([t, n]) => `${n}× ${t}`).join(', ');
  el.innerHTML = `<span class="kv-accent font-semibold">${feats.length} feature(s):</span> <span class="text-gray-300">${summary}</span>`;
}

/* =========================================================
   LISTENER DE SELEÇÃO (giraffeState)
   ========================================================= */
function setupSelectionListener() {
  // A chave exata pode variar entre versões do SDK; tentamos as candidatas
  const candidateKeys = ['selected', 'selectedFeatures', 'mapSelectCoord'];
  candidateKeys.forEach((key) => {
    try {
      giraffeState.addListener([key], async () => {
        const feats = await readSelection();
        updateSelStatus(feats);
      });
    } catch (e) {
      // chave inexistente nesta versão — ignorar silenciosamente
    }
  });
  log('Listener de seleção registrado.');
}

/* =========================================================
   POPUP HTML
   ========================================================= */
function buildPopupHtml(feature, propKeys) {
  const rows = propKeys
    .map((k) => {
      const v = getProp(feature, k);
      if (v === null) return '';
      return `<tr>
        <td style="padding:2px 8px 2px 0;color:#00ACCD;font-weight:600;">${k}</td>
        <td style="padding:2px 0;color:#333;">${v}</td>
      </tr>`;
    })
    .filter(Boolean)
    .join('');

  if (!rows) return null;

  return `<div style="font-family:Hind,sans-serif;font-size:12px;min-width:140px;">
    <div style="font-weight:700;border-bottom:2px solid #00ACCD;margin-bottom:4px;padding-bottom:2px;">
      ${getProp(feature, 'name') || 'Feature'}
    </div>
    <table style="border-collapse:collapse;">${rows}</table>
  </div>`;
}

async function applyPopups(features, propKeys) {
  // O SDK mantém apenas um popup SDK ativo por vez; aplicamos no
  // centroide de cada feature em sequência — o último fica visível.
  // Para 1 feature selecionada (caso mais comum) o comportamento é o esperado.
  let count = 0;
  for (const f of features) {
    const c = centroid(f);
    if (!c) continue;
    const html = buildPopupHtml(f, propKeys);
    if (!html) continue;
    try {
      // Assinatura posicional confirmada nos docs: (html, lngLat, PopupOptions)
      await rpc.invoke('addHtmlPopup', [html, c, { closeButton: true, maxWidth: '320px' }]);
      log(`Popup criado em [${c[0].toFixed(6)}, ${c[1].toFixed(6)}]`);
      // Voa até o popup para garantir visibilidade (pode estar fora do enquadramento)
      try { await rpc.invoke('flyTo', [{ center: c, duration: 800 }]); } catch (e) {}
      count++;
    } catch (e) {
      log('addHtmlPopup falhou: ' + e.message, true);
    }
  }
  log(`Popup(s) aplicado(s): ${count}${count > 1 ? ' (apenas o último permanece visível — limitação do SDK)' : ''}`);
}

/* =========================================================
   LABELS — Points com propriedades nativas de texto
   ========================================================= */
function buildLabelText(feature, propKeys) {
  const lines = propKeys
    .map((k) => {
      const v = getProp(feature, k);
      return v === null ? '' : `${k}: ${v}`;
    })
    .filter(Boolean);
  return lines.join('\n');
}

function buildLabelFeatures(features, propKeys) {
  const out = [];
  features.forEach((f, i) => {
    const c = centroid(f);
    if (!c) return;

    // Copia os valores das propriedades escolhidas para as properties do
    // próprio ponto usando prefixo kv_ — evita colisão com chaves nativas
    // (usage, height, levels teriam efeito colateral no engine/no Pin).
    const copiedProps = {};
    const templateLines = [];
    propKeys.forEach((k) => {
      const v = getProp(f, k);
      if (v === null) return;
      copiedProps['kv_' + k] = v;
      templateLines.push(`${PROP_PT[k] || k}: {{get(properties, 'kv_${k}')}}`);
    });
    if (!templateLines.length) return;

    out.push({
      type: 'Feature',
      geometry: { type: 'Point', coordinates: c },
      properties: {
        // --- valores copiados da feature de origem (lidos pelos templates) ---
        ...copiedProps,
        // --- estrutura nativa do ponto de texto (genericPoint/Pin) ---
        // (depois do spread: nada pode sobrescrever usage/type/layerId)
        type: 'genericPoint',
        usage: 'Pin',
        // Layer escolhido no dropdown do app (padrão: 'default')
        // (obrigatório ter layerId — sem ele: cleanedSections undefined)
        layerId: $('layerSelect').value || 'default',
        public: true,
        stackOrder: 0,
        _visible: true,
        _baseHeight: 0,
        _height: 0,
        _baseElevation: 0,
        marker: {
          kind: 'text',
          value: {
            text: templateLines.join('\n'),
            onTop: true,
            scale: 1,
            shape: 'square',
            stick: false,
            anchor: 'bottom',
            textSize: 14,
            shapeSize: 40,
            textColor: '#041178',
            renderMode: 'screen',
            borderColor: '#00ACCD',
            borderWidth: 2,
            stickHeight: 0,
            backgroundColor: '#FFFFFF',
          },
        },
        // --- controle do app ---
        sp_tag: SP_TAG,
        sp_source: f.properties?.id || f.id || null,  // vínculo com a feature de origem
        sp_props: propKeys,                            // quais propriedades sincronizar
        name: `kv_annot_${i + 1}`,
      },
    });
  });
  return out;
}

// Deleção idempotente: varre rawSections e remove features com sp_tag
async function deleteTaggedSections() {
  try {
    let raw = giraffeState.get('rawSections');
    // rawSections pode vir como objeto {features:[...]} ou array — normalizar
    let feats = [];
    if (Array.isArray(raw)) feats = raw;
    else if (raw?.features) feats = raw.features;
    else if (raw && typeof raw === 'object') feats = Object.values(raw);

    const ids = feats
      .filter((f) => f?.properties?.sp_tag === SP_TAG)
      .map((f) => f.id || f.properties?.id)
      .filter(Boolean);

    if (ids.length) {
      await rpc.invoke('deleteRawSections', [ids]);
      log(`Removidos ${ids.length} label(s) anteriores (tag ${SP_TAG}).`);
    }
    return ids.length;
  } catch (e) {
    log('deleteTaggedSections: ' + e.message, true);
    return 0;
  }
}

async function applyLabels(features, propKeys) {
  const labelFeats = buildLabelFeatures(features, propKeys);
  if (!labelFeats.length) {
    log('Nenhum label a criar (sem propriedades válidas).');
    return;
  }
  // Ciclo idempotente: deletar antigos → criar novos (padrão Sun Path)
  await deleteTaggedSections();
  try {
    await rpc.invoke('createRawSections', [labelFeats]);
    log(`${labelFeats.length} label(s) criado(s) via createRawSections.`);
  } catch (e) {
    log('createRawSections falhou: ' + e.message, true);
    // Fallback: camada temporária (não persiste, mas exibe)
    try {
      await rpc.invoke('addTempLayerGeoJSON', [
        'KV Anotações',
        { type: 'FeatureCollection', features: labelFeats },
        { type: 'symbol', layout: { 'text-field': ['get', 'text'], 'text-size': 14 }, paint: { 'text-color': '#000000' } },
      ]);
      log('Fallback: labels exibidos em camada temporária "KV Anotações".');
    } catch (e2) {
      log('Fallback addTempLayerGeoJSON também falhou: ' + e2.message, true);
    }
  }
}

/* =========================================================
   AÇÕES PRINCIPAIS
   ========================================================= */
$('btnApply').onclick = async () => {
  const propKeys = getSelectedPropKeys();
  if (!propKeys.length) { log('Selecione ao menos uma propriedade.', true); return; }

  const wantPopup = $('outPopup').checked;
  const wantLabel = $('outLabel').checked;
  if (!wantPopup && !wantLabel) { log('Selecione ao menos um tipo de saída.', true); return; }

  const feats = await readSelection();
  updateSelStatus(feats);
  if (!feats.length) { log('Nenhuma geometria selecionada no mapa.', true); return; }

  log(`Processando ${feats.length} feature(s) com [${propKeys.join(', ')}]...`);
  if (wantPopup) await applyPopups(feats, propKeys);
  if (wantLabel) await applyLabels(feats, propKeys);
};

$('btnClear').onclick = async () => {
  try { await rpc.invoke('clearSDKPopup', []); } catch (e) {}
  const n = await deleteTaggedSections();
  log(`Limpeza concluída (${n} label(s) removidos, popup fechado).`);
};

/* =========================================================
   ATUALIZAR PONTOS — sincroniza valores sem mover geometria
   ========================================================= */
function getRawSectionFeatures() {
  let raw = giraffeState.get('rawSections');
  let feats = [];
  if (Array.isArray(raw)) feats = raw;
  else if (raw?.features) feats = raw.features;
  else if (raw && typeof raw === 'object') feats = Object.values(raw);
  return feats.filter(Boolean);
}

async function updatePoints() {
  // Lê direto de giraffeState.rawSections — inclui features em layers
  // ocultos (visibilidade é só de renderização, os dados continuam lá).
  const all = getRawSectionFeatures();

  // Índice de features por id (candidatas a origem)
  const byId = {};
  all.forEach((f) => {
    const id = f.id || f.properties?.id;
    if (id) byId[id] = f;
  });

  // Pontos criados por este app
  const points = all.filter((f) => f?.properties?.sp_tag === SP_TAG);
  if (!points.length) { log('Nenhum ponto do app encontrado para atualizar.', true); return; }

  const toUpdate = [];
  let orphans = 0;

  for (const pt of points) {
    const srcId = pt.properties.sp_source;
    const propKeys = pt.properties.sp_props || [];
    const src = srcId ? byId[srcId] : null;

    if (!src) {
      orphans++;
      log(`Ponto ${pt.properties.name || pt.id}: origem ${srcId || '?'} não encontrada (órfão).`, true);
      continue;
    }

    // Recalcula os valores copiados a partir da origem atual (chaves kv_)
    const copiedProps = {};
    const templateLines = [];
    propKeys.forEach((k) => {
      const v = getProp(src, k);
      if (v === null) return;
      copiedProps['kv_' + k] = v;
      templateLines.push(`${PROP_PT[k] || k}: {{get(properties, 'kv_${k}')}}`);
    });

    // Mantém geometria, layer, usage e estilo ATUAIS do ponto —
    // só as chaves kv_* e o texto do marker são reescritos.
    const updated = {
      ...pt,
      geometry: pt.geometry,
      properties: {
        ...pt.properties,
        ...copiedProps,
        marker: {
          ...pt.properties.marker,
          value: {
            ...(pt.properties.marker?.value || {}),
            text: templateLines.join('\n'),
          },
        },
      },
    };
    toUpdate.push(updated);
  }

  if (!toUpdate.length) { log('Nada a atualizar.' + (orphans ? ` (${orphans} órfão(s))` : ''), true); return; }

  try {
    await rpc.invoke('updateRawSections', [toUpdate]);
    const layers = [...new Set(toUpdate.map((f) => f.properties.layerId || '?'))].join(', ');
    log(`${toUpdate.length} ponto(s) atualizado(s) — posições e layers preservados (${layers}).` + (orphans ? ` ${orphans} órfão(s) ignorados.` : ''));
  } catch (e) {
    log('updateRawSections falhou: ' + e.message, true);
  }
}

$('btnUpdate').onclick = updatePoints;

$('btnInspect').onclick = async () => {
  const feats = await readSelection();
  if (!feats.length) { log('Nada selecionado para inspecionar.', true); return; }
  feats.forEach((f, i) => {
    log(`--- Feature ${i + 1} (${f.geometry?.type}) properties raw ---`);
    log(JSON.stringify(f.properties || {}, null, 2));
  });
};

/* =========================================================
   INIT
   ========================================================= */
(async () => {
  log('App carregado. SDK importado via esm.sh.');
  setupSelectionListener();
  populateLayerSelect();
  const feats = await readSelection();
  updateSelStatus(feats);
})();
</script>
</body>
</html>
